<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ozcanpng</title>

  <meta name="description" content="Offensive security researcher — CTF write-ups, CVE analysis, exploit development." />
  <meta property="og:title" content="ozcanpng" />
  <meta property="og:description" content="Offensive security researcher — CTF write-ups, CVE analysis, exploit development." />
  <meta property="og:image" content="https://github.com/ozcanpng.png" />
  <meta property="og:url" content="https://ozcanpng.dev/" />
  <meta name="twitter:card" content="summary" />
  <link rel="canonical" href="https://ozcanpng.dev/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" />

  <style>
    :root {
      --bg:      #08080f;
      --bg2:     #0f0f1a;
      --bg3:     #151525;
      --text:    #e2dff0;
      --muted:   #7b7a9a;
      --dim:     #3d3c58;
      --purple:  #a855f7;
      --purple2: #7c3aed;
      --glow:    rgba(168,85,247,.12);
      --border:  rgba(168,85,247,.12);
      --ctf:     #34d399;
      --cve:     #f87171;
      --other:   #a855f7;
      --radius:  10px;
      --max:     860px;
      --ease:    cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 1. GLOBAL SCROLL PROGRESS ───────────────── */
    .scroll-progress {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--purple2), var(--purple));
      z-index: 9999; transition: width .1s linear;
    }

    /* ── NAV ─────────────────────────────────────── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(16px) saturate(180%);
      background: rgba(8,8,15,.8);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: var(--max); margin: 0 auto;
      padding: 0 1.5rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1rem;
      color: var(--text); text-decoration: none;
      letter-spacing: -.01em;
    }
    .nav-logo span { color: var(--purple); }

    .nav-links { display: flex; gap: .25rem; }
    .nav-link {
      position: relative;
      font-size: .82rem; font-weight: 500;
      color: var(--muted); text-decoration: none;
      padding: .4rem .75rem;
      border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .nav-link:hover { color: var(--text); background: var(--bg3); }

    /* ── 7. NAV ACTIVE UNDERLINE ─────────────────── */
    .nav-link.active { color: var(--purple); }
    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: 2px; left: 50%;
      transform: translateX(-50%);
      width: 16px; height: 2px;
      background: var(--purple);
      border-radius: 2px;
    }

    .nav-mobile-btn {
      display: none;
      background: none; border: none;
      color: var(--muted); cursor: pointer; padding: .4rem;
    }

    /* ── 8. ROUTE FADE ───────────────────────────── */
    #page {
      transition: opacity .18s var(--ease), transform .18s var(--ease);
    }
    #page.leaving {
      opacity: 0; transform: translateY(8px);
      pointer-events: none;
    }

    /* ── PAGE WRAPPER ────────────────────────────── */
    .page-inner {
      max-width: var(--max); margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── 4. HERO ATMOSPHERE ──────────────────────── */
    .hero {
      position: relative;
      padding: 5rem 0 3.5rem;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 90% 60% at 50% -10%, rgba(124,58,237,.22), transparent 70%),
        radial-gradient(ellipse 35% 50% at 95% 60%,  rgba(168,85,247,.08), transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .hero > * { position: relative; z-index: 1; }

    .hero-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem; color: var(--purple);
      letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    .hero-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.6rem, 7vw, 3.8rem);
      font-weight: 800; line-height: 1.05;
      letter-spacing: -.03em; color: var(--text);
      margin-bottom: 1.1rem;
    }
    .hero-name span {
      background: linear-gradient(135deg, #c084fc, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── 5. TERMINAL PROMPT ──────────────────────── */
    .typing-wrap {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: .45rem;
    }
    .prompt {
      color: var(--dim);
      user-select: none;
    }
    .prompt-user { color: #34d399; }
    .prompt-at   { color: var(--dim); }
    .prompt-host { color: #60a5fa; }
    .prompt-path { color: var(--muted); }
    .prompt-sym  { color: var(--purple); }
    .typing-text { color: var(--text); }
    .cursor {
      display: inline-block; width: 6px; height: .85em;
      background: var(--purple); vertical-align: text-bottom;
      animation: blink 1s step-end infinite; margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .hero-bio {
      font-size: 1.02rem; color: var(--muted);
      max-width: 520px; line-height: 1.65; margin-bottom: 2rem;
    }
    .hero-actions { display: flex; gap: .75rem; flex-wrap: wrap; }

    .btn {
      font-size: .82rem; font-weight: 600;
      padding: .55rem 1.2rem; border-radius: 8px;
      text-decoration: none;
      transition: all .15s var(--ease);
      display: inline-flex; align-items: center; gap: .4rem;
    }
    .btn-primary { background: var(--purple2); color: #fff; border: 1px solid var(--purple2); }
    .btn-primary:hover { background: var(--purple); border-color: var(--purple); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--dim); background: var(--bg2); }

    /* ── SECTION HEADER ──────────────────────────── */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin: 3rem 0 1.25rem;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: .95rem; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase;
      color: var(--muted);
    }
    .section-more {
      font-size: .78rem; color: var(--purple);
      text-decoration: none; transition: opacity .15s;
    }
    .section-more:hover { opacity: .7; }

    /* ── 3. FILTER TABS ──────────────────────────── */
    .filter-tabs {
      display: flex; gap: .35rem;
      margin-bottom: 1rem; flex-wrap: wrap;
    }
    .filter-tab {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem; font-weight: 500;
      letter-spacing: .06em; text-transform: uppercase;
      padding: .3rem .75rem;
      min-width: 4.5rem; text-align: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer;
      transition: all .15s var(--ease);
    }
    .filter-tab:hover { color: var(--text); border-color: var(--dim); background: var(--bg2); }
    .filter-tab.active { background: var(--purple2); border-color: var(--purple2); color: #fff; }
    .filter-tab.active-ctf  { background: rgba(52,211,153,.15); border-color: var(--ctf);  color: var(--ctf);  }
    .filter-tab.active-cve  { background: rgba(248,113,113,.15); border-color: var(--cve);  color: var(--cve);  }
    .filter-tab.active-other{ background: rgba(168,85,247,.15);  border-color: var(--purple); color: var(--purple); }

    /* ── 2. POST LIST + STAGGER ──────────────────── */
    .post-list {
      display: flex; flex-direction: column;
      border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: none; }
    }

    .post-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center; gap: 1rem;
      padding: .9rem 1.25rem;
      text-decoration: none; color: inherit;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      animation: fadeUp .3s var(--ease) both;
    }
    .post-item:last-child { border-bottom: none; }
    .post-item:hover { background: var(--bg2); }

    .post-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: .62rem; font-weight: 500;
      letter-spacing: .08em; text-transform: uppercase;
      padding: .2rem .5rem; border-radius: 4px;
      border: 1px solid currentColor; white-space: nowrap;
    }
    .post-tag.ctf   { color: var(--ctf); }
    .post-tag.cve   { color: var(--cve); }
    .post-tag.other { color: var(--other); }

    .post-title {
      font-weight: 500; font-size: .9rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .post-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem; color: var(--muted);
      white-space: nowrap;
      display: flex; align-items: center; gap: .5rem;
    }

    .stars { font-size: .65rem; color: var(--dim); letter-spacing: -.05em; }
    .stars .on { color: var(--purple); }

    /* ── PROJECT GRID ────────────────────────────── */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px; background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }

    .project-card {
      background: var(--bg);
      padding: 1.25rem; text-decoration: none; color: inherit;
      transition: background .15s;
      display: flex; flex-direction: column; gap: .5rem;
    }
    .project-card:hover { background: var(--bg2); }
    .project-card-more {
      display: flex; align-items: center; justify-content: center;
      color: var(--dim); font-family: 'JetBrains Mono', monospace;
      font-size: .75rem; gap: .5rem; min-height: 90px;
      border: none; text-decoration: none;
    }
    .project-card-more:hover { color: var(--purple); background: var(--bg2); }

    .project-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem; font-weight: 500; color: #c084fc;
    }
    .project-desc { font-size: .8rem; color: var(--muted); line-height: 1.5; flex: 1; }

    /* ── 6. PROJECT META WITH LANG DOT ───────────── */
    .project-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem; color: var(--dim);
      display: flex; gap: .75rem; flex-wrap: wrap;
      margin-top: .25rem; align-items: center;
    }
    .lang-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .lang-label {
      display: flex; align-items: center; gap: .3rem;
    }

    /* ── ABOUT PAGE ──────────────────────────────── */
    .about-section { padding-top: 3rem; }
    .about-avatar {
      width: 80px; height: 80px;
      border-radius: 50%; border: 2px solid var(--purple2);
      margin-bottom: 1.5rem;
    }
    .about-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem; font-weight: 800;
      letter-spacing: -.02em; margin-bottom: .5rem;
    }
    .about-role {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem; color: var(--purple);
      letter-spacing: .1em; text-transform: uppercase; margin-bottom: 1.5rem;
    }
    .about-body {
      font-size: .96rem; color: var(--muted);
      line-height: 1.8; max-width: 580px;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .about-body em { color: var(--text); font-style: normal; font-weight: 500; }
    .badge-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; }
    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem; padding: .3rem .65rem;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted);
    }

    /* ── POST READER ─────────────────────────────── */
    .post-reader { padding-top: 2.5rem; }

    .post-reader-back {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .78rem; color: var(--muted);
      text-decoration: none; margin-bottom: 2.5rem;
      transition: color .15s;
    }
    .post-reader-back:hover { color: var(--purple); }

    .post-reader-header { margin-bottom: 2rem; }
    .post-reader-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase;
      padding: .2rem .55rem; border-radius: 4px;
      border: 1px solid currentColor;
      display: inline-block; margin-bottom: 1rem;
    }
    .post-reader-tag.ctf   { color: var(--ctf); }
    .post-reader-tag.cve   { color: var(--cve); }
    .post-reader-tag.other { color: var(--other); }

    .post-reader-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800; line-height: 1.15;
      letter-spacing: -.02em; margin-bottom: .75rem;
    }
    .post-reader-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem; color: var(--muted);
      display: flex; gap: .75rem; flex-wrap: wrap;
    }
    .post-reader-divider {
      height: 1px; background: var(--border); margin: 1.75rem 0;
    }

    /* ── MARKDOWN ────────────────────────────────── */
    .md {
      font-family: 'Manrope', sans-serif;
      font-size: .97rem; line-height: 1.8; color: var(--text);
    }
    .md > * + * { margin-top: 1.2em; }
    .md h1, .md h2, .md h3, .md h4 {
      font-family: 'Syne', sans-serif;
      font-weight: 700; letter-spacing: -.02em; line-height: 1.25; color: var(--text);
    }
    .md h1 { font-size: 1.7rem; margin-top: 2rem; }
    .md h2 { font-size: 1.3rem; margin-top: 1.8rem; color: #c084fc; }
    .md h3 { font-size: 1.1rem; margin-top: 1.4rem; }
    .md a { color: var(--purple); text-underline-offset: 3px; }
    .md a:hover { opacity: .8; }
    .md code {
      font-family: 'JetBrains Mono', monospace;
      font-size: .82em; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 4px;
      padding: .12em .38em; color: #c4b5fd;
    }
    .md pre {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; overflow-x: auto;
    }
    .md pre code { background: none; border: none; padding: 0; font-size: .83rem; }
    .md blockquote {
      border-left: 3px solid var(--purple);
      padding: .6rem 1.2rem; background: var(--glow);
      border-radius: 0 var(--radius) var(--radius) 0; color: var(--muted);
    }
    .md ul, .md ol { padding-left: 1.5rem; }
    .md li + li { margin-top: .35em; }
    .md table { border-collapse: collapse; width: 100%; }
    .md th, .md td { border: 1px solid var(--border); padding: .5rem .85rem; font-size: .88rem; }
    .md th { background: var(--bg2); font-family: 'JetBrains Mono', monospace; font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; }
    .md tr:nth-child(even) { background: var(--bg2); }
    .md img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--border); }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .md strong { font-weight: 600; color: var(--text); }

    /* ── LOADER ──────────────────────────────────── */
    .loader {
      display: flex; align-items: center; gap: .5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem; color: var(--muted); padding: 4rem 0;
    }
    .loader-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--purple); animation: pulse 1.2s ease-in-out infinite;
    }
    .loader-dot:nth-child(2) { animation-delay: .2s; }
    .loader-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,100% { opacity: .2; } 50% { opacity: 1; } }

    .empty { padding: 3rem; text-align: center; font-size: .85rem; color: var(--muted); }

    /* ── FOOTER ──────────────────────────────────── */
    .footer {
      max-width: var(--max); margin: 0 auto;
      padding: 2rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
    }
    .footer-left { font-family: 'JetBrains Mono', monospace; font-size: .7rem; color: var(--dim); }
    /* ── LIGHTBOX ─────────────────────────────────── */
    .lightbox-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.88);
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-out;
      backdrop-filter: blur(6px);
      animation: lbIn .15s ease;
    }
    @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }
    .lightbox-overlay img {
      max-width: 92vw; max-height: 88vh; object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 0 60px rgba(168,85,247,.25);
      cursor: default;
    }
    .md img { cursor: zoom-in; transition: opacity .15s; border-radius: 6px; }
    .md img:hover { opacity: .85; }

    .footer-visitors {
      font-family: 'JetBrains Mono', monospace; font-size: .7rem;
      color: var(--dim); display: flex; align-items: center; gap: .4rem;
    }
    .footer-visitors::before { content: '👁'; font-size: .65rem; }
    .footer-links { display: flex; gap: 1rem; }
    .footer-links a {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem; color: var(--dim);
      text-decoration: none; transition: color .15s;
    }
    .footer-links a:hover { color: var(--purple); }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .nav-mobile-btn { display: block; }
      .nav-links.open {
        display: flex; flex-direction: column;
        position: absolute; top: 56px; left: 0; right: 0;
        background: var(--bg); border-bottom: 1px solid var(--border);
        padding: .75rem 1rem;
      }
      .hero { padding: 3rem 0 2.5rem; }
      .post-item { grid-template-columns: auto 1fr; }
      .post-meta  { display: none; }
      .project-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <!-- NAV -->
  <nav class="nav">

      <a href="#home" class="nav-logo">ozcan<span>png</span></a>

      </button>

  </nav>

  <script>
const GH_USER = 'ozcanpng';
const GH_REPO = 'ozcanpng.github.io';

/* ── 6. LANGUAGE COLORS ────────────────────────── */
const LANG_COLORS = {
  JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572a5',
  Go: '#00add8', Rust: '#dea584', C: '#555555', 'C++': '#f34b7d',
  'C#': '#178600', Shell: '#89e051', HTML: '#e34c26', CSS: '#563d7c',

/* ── CACHE ─────────────────────────────────────── */
function getCache(k, ttl = 3600000) {
  try {
    const s = localStorage.getItem(k);
    if (!s) return null;
    const { d, t } = JSON.parse(s);
    if (Date.now() - t > ttl) { localStorage.removeItem(k); return null; }
    return d;
  } catch { return null; }
}
function setCache(k, d) {
  try { localStorage.setItem(k, JSON.stringify({ d, t: Date.now() })); } catch {}
}

/* ── GLOBAL SCROLL PROGRESS ─────────────────────── */
window.addEventListener('scroll', () => {
  const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
  document.getElementById('scroll-bar').style.width = Math.min(pct, 100) + '%';
}, { passive: true });

/* ── 5. TYPING — TERMINAL STYLE ─────────────────── */
function startTyping(el) {
  const cmds = ['go run backdoor.go', 'jadx-gui ./target.apk', 'frida -U -f com.target.app', 'adb shell id', 'burpsuite --project web.json'];
  let wi = 0, ci = 0, del = false;
  const textEl = el.querySelector('.typing-text');
  const cursor = el.querySelector('.cursor');
  function tick() {
    if (!document.body.contains(el)) return; // unmounted — stop timer
    const w = cmds[wi];
    if (del) { textEl.textContent = w.slice(0, --ci); }
    else     { textEl.textContent = w.slice(0, ++ci); }
    textEl.after(cursor);
    let ms = del ? 45 : 100;
    if (!del && ci === w.length) { ms = 2000; del = true; }
    else if (del && ci === 0)   { del = false; wi = (wi+1) % cmds.length; ms = 500; }
    setTimeout(tick, ms);
  }
  setTimeout(tick, 700);
}

/* ── GITHUB API ────────────────────────────────── */
async function ghGet(url) {
  const r = await fetch(url, { headers: { Accept: 'application/vnd.github.v3+json' } });
  if (!r.ok) throw new Error(`GH ${r.status}`);
  return r.json();
}

async function getRepos() {
  const k = 'gh_repos_v3';
  const c = getCache(k);
  if (c) return c;
  const all = await ghGet(`https://api.github.com/users/${GH_USER}/repos?sort=created&per_page=12`);
  const d = all.filter(r => !['ozcanpng','ozcanpng.github.io'].includes(r.name)).slice(0,9);
  setCache(k, d); return d;
}

async function getPosts() {
  const k = 'gh_posts_v3';
  const c = getCache(k, 1800000);
  if (c) return c;
  const files = await ghGet(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents`);
  const mds = files.filter(f => f.name.endsWith('.md') && f.name !== 'README.md');
  const posts = await Promise.all(mds.map(async f => {
    const name = f.name.replace('.md','');
    try {
      const commits = await ghGet(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/commits?path=${f.name}&per_page=100`);
      const first = commits[commits.length-1];
      return { name, date: first ? new Date(first.commit.author.date) : new Date() };
    } catch { return { name, date: new Date() }; }
  }));
  const d = posts.sort((a,b) => b.date - a.date);
  setCache(k, d); return d;
}

/* ── METADATA ──────────────────────────────────── */
function calcReadTime(t) {
  if (!t) return '5 min';
  const cl = (t.match(/```[\s\S]*?```/g)||[]).reduce((s,b)=>s+b.split('\n').length-2,0);
  const w = t.replace(/```[\s\S]*?```/g,'').replace(/[#*_[\]()!`]/g,'').split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.round(w/180 + cl/30)) + ' min';
}
function detectCat(name, content='') {
  const n = name.toLowerCase(), c = content.toLowerCase();
  if (n.includes('ctf')||n.includes('thm')||n.includes('htb')||c.includes('tryhackme')||c.includes('hackthebox')||c.includes('ctf')) return 'ctf';
  if (n.includes('cve')||n.includes('exploit')||c.includes('cve-')||c.includes('zafiyet')) return 'cve';
  return 'other';
}
function detectDiff(c='') {
  if (c.includes('Insane')||c.includes('Very Hard')) return 5;
  if (c.includes('Hard')||c.includes('Zor')) return 4;
  if (c.includes('Medium')||c.includes('Orta')) return 3;
  if (c.includes('Easy')||c.includes('Kolay')) return 2;
  if (c.includes('Beginner')) return 1;
  return 3;
}
async function getMeta(name) {
  const k = `meta_v2_${name}`;
  const c = getCache(k, 86400000);
  if (c) return c;
  const cfg = POST_CONFIG[name];
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${name}.md`);
    const text = res.ok ? await res.text() : '';
    const m = {
      category: cfg ? cfg.tag : detectCat(name, text),
      difficulty: cfg ? cfg.difficulty : detectDiff(text),
      readTime: calcReadTime(text)
    };
    setCache(k, m); return m;
  } catch {
    return {
      category: cfg ? cfg.tag : detectCat(name),
      difficulty: cfg ? cfg.difficulty : 3,
      readTime: '5 min'
    };
  }
}

/* ── 3. CATEGORY FILTER ────────────────────────── */
function initFilter() {
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.filter;
      // Update active tab styling
      document.querySelectorAll('.filter-tab').forEach(b => {
        b.classList.remove('active','active-ctf','active-cve','active-other');
      });
      if (f === 'all') btn.classList.add('active');
      else btn.classList.add(`active-${f}`);

      // Filter items with stagger re-animation
      let visible = 0;
      document.querySelectorAll('.post-item').forEach(item => {
        const match = f === 'all' || item.dataset.category === f;
        item.style.display = match ? 'grid' : 'none';
        if (match) {
          item.style.animationDelay = `${visible * 45}ms`;
          item.style.animation = 'none';
          item.offsetHeight; // reflow
          item.style.animation = '';
          visible++;
        }
      });
    });
  });
}

/* ── 7. ACTIVE NAV + ROUTER ────────────────────── */
function setNav(route) {
  document.querySelectorAll('.nav-link').forEach(a =>
    a.classList.toggle('active', a.dataset.route === route)
  );
}

function router() {
  const hash = location.hash.replace('#','');
  if (!hash || hash === 'home') navigate(() => { routes.home(); setNav('home'); });
  else if (hash === 'blog')     navigate(() => { routes.blog(); setNav('blog'); });
  else if (hash === 'about')    navigate(() => { routes.about(); setNav('about'); });
  else if (hash.startsWith('post=')) {
    navigate(() => { routes.post(decodeURIComponent(hash.replace('post=',''))); setNav('blog'); });
  } else navigate(() => { routes.home(); setNav('home'); });
}

/* ── LIGHTBOX ───────────────────────────────────── */
function initLightbox() {
  document.querySelectorAll('.md img').forEach(img => {
    img.addEventListener('click', () => {
      const ov = document.createElement('div');
      ov.className = 'lightbox-overlay';
      const big = new Image();
      big.src = img.src; big.alt = img.alt;
      ov.appendChild(big);
      ov.addEventListener('click', () => ov.remove());
      big.addEventListener('click', e => e.stopPropagation());
      document.addEventListener('keydown', function esc(e) {
        if (e.key === 'Escape') { ov.remove(); document.removeEventListener('keydown', esc); }
      });
      document.body.appendChild(ov);
    });
  });
}
